<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-reveal {
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            animation: reveal 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes reveal {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        /* Smooth fade transition between pages */
        .page-section {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .page-section.active {
            display: flex;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-black min-h-screen text-gray-300 font-sans selection:bg-amber-500 selection:text-black">

    <audio id="bg-audio" loop>
        <source src="the ride.mp3" type="audio/mpeg">
    </audio>

    <section id="page-home" class="page-section active min-h-screen flex-col items-center justify-center p-6">
        <div class="max-w-2xl text-center space-y-8 w-full">
            <h1 class="text-4xl md:text-5xl font-light tracking-widest text-white uppercase mb-12">
                The <span class="text-amber-400 font-medium">Archive</span>
            </h1>
            
            <div class="flex flex-col gap-6">
                <button onclick="navigate('page-about')" class="group relative px-8 py-4 border border-zinc-800 hover:border-amber-400 transition-all duration-500 ease-out bg-zinc-950/50 hover:bg-amber-400/10 cursor-pointer">
                    <span class="text-lg tracking-wide group-hover:text-amber-400 transition-colors duration-300">
                        What's this about?
                    </span>
                </button>
            </div>
        </div>
    </section>

    <section id="page-about" class="page-section min-h-screen items-center justify-center overflow-hidden text-center p-6">
        <div id="about-content">
            <p class="text-amber-400 tracking-[0.3em] uppercase text-sm mb-4">Chapter I</p>
            <h2 class="text-3xl md:text-5xl font-light text-white leading-relaxed max-w-3xl">
                Ndinemizwa for wena, <br>
                Imizwa yam ibanzi igabalala. <br>
                Ndiphe ithuba ndikubonise ubunzulu bothando lwam, <br>
                <span class="text-amber-500 italic font-serif">Be my woman.</span>
            </h2>
            <div class="mt-12">
                <button onclick="navigate('page-home')" class="text-zinc-500 hover:text-amber-400 transition-colors text-sm uppercase tracking-widest border-b border-transparent hover:border-amber-400 pb-1 cursor-pointer">Return</button>
            </div>
        </div>
    </section>
    <script>
        const audio = document.getElementById('bg-audio');
        let audioStarted = false;

        function navigate(targetPageId) {
            // 1. Handle Audio (Start playing on the very first button click)
            // Modern browsers block autoplay until the user interacts with the page
            if (!audioStarted && targetPageId === 'page-about') {
                audio.play().catch(e => console.log("Audio play failed:", e));
                audioStarted = true;
            }

            // 2. Hide all sections
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(section => {
                section.classList.remove('active');
                // Brief delay to allow CSS fade-out to happen before setting display:none
                setTimeout(() => {
                    if (!section.classList.contains('active')) {
                        section.style.display = 'none';
                    }
                }, 50); 
            });

            // 3. Show target section
            const target = document.getElementById(targetPageId);
            target.style.display = targetPageId === 'page-home' || targetPageId === 'page-about' ? 'flex' : 'block';
            
            // Force browser reflow to ensure fade-in transition works
            void target.offsetWidth; 
            target.classList.add('active');

            // 4. Re-trigger the CSS animation for the About page text
            if (targetPageId === 'page-about') {
                const aboutContent = document.getElementById('about-content');
                aboutContent.classList.remove('animate-reveal');
                void aboutContent.offsetWidth; // Force reflow
                aboutContent.classList.add('animate-reveal');
            }
        }
    </script>
</body>
</html>
